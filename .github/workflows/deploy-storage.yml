name: Deploy Storage Account

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: aks-runners
    environment: dev

    defaults:
      run:
        working-directory: examples/storage-account

    env:
      # Workload Identity auth — no client secret required.
      ARM_CLIENT_ID:            ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:            ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID:      ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:             "true"
      # AKS Workload Identity always mounts the federated token at this fixed path.
      # The azurerm provider reads ARM_OIDC_TOKEN_FILE_PATH (not AZURE_FEDERATED_TOKEN_FILE).
      ARM_OIDC_TOKEN_FILE_PATH: "/var/run/secrets/azure/tokens/azure-identity-token"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Workload Identity token
        run: |
          echo "Runner hostname          : $(hostname)"
          echo "ARM_CLIENT_ID            : ${ARM_CLIENT_ID}"
          echo "ARM_TENANT_ID            : ${ARM_TENANT_ID}"
          echo "ARM_SUBSCRIPTION_ID      : ${ARM_SUBSCRIPTION_ID}"
          echo "ARM_OIDC_TOKEN_FILE_PATH : ${ARM_OIDC_TOKEN_FILE_PATH}"
          echo "AZURE_FEDERATED_TOKEN_FILE: ${AZURE_FEDERATED_TOKEN_FILE}"
          TOKEN_FILE="${ARM_OIDC_TOKEN_FILE_PATH}"
          if [ -f "${TOKEN_FILE}" ]; then
            echo "Token file: present at ${TOKEN_FILE}"
            # Decode JWT payload to verify issuer, subject, and audience
            PAYLOAD=$(cat "${TOKEN_FILE}" | cut -d'.' -f2 | awk '{n=length($0)%4; if(n==2) $0=$0"=="; else if(n==3) $0=$0"="; print}' | base64 -d 2>/dev/null || true)
            echo "Token claims: ${PAYLOAD}"
          else
            echo "ERROR: Token file not found at ${TOKEN_FILE}"
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        if: >
          github.event.inputs.action == 'plan' ||
          github.event.inputs.action == 'apply'

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        if: github.event.inputs.action == 'apply'

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        if: github.event.inputs.action == 'destroy'
