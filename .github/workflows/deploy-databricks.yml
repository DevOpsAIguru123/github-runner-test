name: Deploy Databricks Cluster

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: aks-runners

    defaults:
      run:
        working-directory: examples/databricks-cluster

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Exchange WI token for Databricks AAD token
        run: |
          OIDC_TOKEN=$(cat "${AZURE_FEDERATED_TOKEN_FILE}")
          RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=${AZURE_CLIENT_ID}" \
            --data-urlencode "client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer" \
            --data-urlencode "client_assertion=${OIDC_TOKEN}" \
            --data-urlencode "scope=2ff814a6-3304-4ab8-85cb-cd0e6f879c1d/.default")
          TOKEN=$(echo "$RESPONSE" | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$TOKEN" ]; then
            echo "Token exchange failed: $RESPONSE"
            exit 1
          fi
          echo "DATABRICKS_AAD_TOKEN=${TOKEN}" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          ACTION: ${{ github.event.inputs.action }}
        run: terraform plan -out=tfplan
        if: >
          github.event.inputs.action == 'plan' ||
          github.event.inputs.action == 'apply'

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        if: github.event.inputs.action == 'apply'

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        if: github.event.inputs.action == 'destroy'
