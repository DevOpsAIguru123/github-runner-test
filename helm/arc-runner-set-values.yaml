# Values for: gha-runner-scale-set
# Chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
#
# Replace GITHUB_OWNER and GITHUB_REPO with your values before deploying.
# The secret 'github-pat-secret' is created by deploy-runners.sh using your PAT.

githubConfigUrl: "https://github.com/DevOpsAIguru123/github-runner-test"
githubConfigSecret: github-pat-secret

# Name used in runs-on: in GitHub Actions workflows
runnerScaleSetName: "aks-runners"

# Autoscaling bounds: scale to 0 when idle, up to 5 concurrent jobs
minRunners: 0
maxRunners: 5

# Default mode: runner executes steps directly inside the pod (no DinD, no sub-pods)
# Simpler and more reliable than kubernetes container mode

# Runner pod template
template:
  metadata:
    labels:
      azure.workload.identity/use: "true"   # required for AKS Workload Identity token injection
  spec:
    serviceAccountName: wi-runner-sa        # annotated with managed identity client ID
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/bin/bash", "-c"]
        args: ["/home/runner/run.sh 2>&1"]
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        env:
          - name: ACTIONS_RUNNER_PRINT_LOG_TO_STDOUT
            value: "1"
          # ── Azure / Terraform auth (Workload Identity, no secrets) ─────────────
          # WI webhook injects AZURE_FEDERATED_TOKEN_FILE, AZURE_CLIENT_ID,
          # AZURE_TENANT_ID automatically. We map them to the ARM_ names that the
          # azurerm Terraform provider reads, and add the subscription ID here so
          # workflows need zero Azure-specific configuration.
          - name: ARM_CLIENT_ID
            value: "81f11862-717d-4da8-b09d-c93f4e6ea9af"
          - name: ARM_TENANT_ID
            value: "342b3f4c-6303-47b1-bea2-e0c6b2200b67"
          - name: ARM_SUBSCRIPTION_ID
            value: "60992dbe-c574-4373-948b-bb02216c5b0a"
          - name: ARM_USE_OIDC
            value: "true"
          - name: ARM_OIDC_TOKEN_FILE_PATH
            value: "/var/run/secrets/azure/tokens/azure-identity-token"
